<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REY XChange</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #141E30, #243B55);
}

.container {
    background: #1f2937;
    padding: 35px;
    width: 380px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    color: white;
}

h2 {
    text-align: center;
    margin-bottom: 25px;
}

.input-group {
    margin-bottom: 20px;
}

label {
    font-size: 14px;
    margin-bottom: 6px;
    display: block;
    color: #9ca3af;
}

input, select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 15px;
}

input {
    background: #374151;
    color: white;
}

select {
    background: #374151;
    color: white;
    cursor: pointer;
}

.result-box {
    margin-top: 20px;
    padding: 15px;
    background: #111827;
    border-radius: 12px;
}

.result {
    font-size: 18px;
    font-weight: bold;
}

.rate {
    font-size: 14px;
    color: #9ca3af;
    margin-top: 5px;
}

.updated {
    font-size: 12px;
    color: #6b7280;
    margin-top: 5px;
}

.swap-btn {
    margin: 10px 0;
    text-align: center;
    cursor: pointer;
    color: #60a5fa;
    font-size: 14px;
}

@media (max-width: 400px) {
    .container {
        width: 90%;
    }
}
</style>
</head>
<body>

<div class="container">
    <h2>💱 REY XChange</h2>

    <div class="input-group">
        <label>Enter Amount</label>
        <input type="number" id="amount" placeholder="Enter amount" />
    </div>

    <div class="input-group">
        <label>From Currency</label>
        <select id="fromCurrency">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
        </select>
    </div>

    <div class="swap-btn" onclick="swapCurrency()">🔄 Swap Currency</div>

    <div class="input-group">
        <label>To Currency</label>
        <select id="toCurrency">
            <option value="INR">INR</option>
        </select>
    </div>

    <div class="result-box">
        <div class="result" id="result">Converted amount will appear here</div>
        <div class="rate" id="rate"></div>
        <div class="updated" id="updated"></div>
    </div>
</div>

<script>
const amountInput = document.getElementById("amount");
const fromCurrency = document.getElementById("fromCurrency");
const toCurrency = document.getElementById("toCurrency");
const resultDiv = document.getElementById("result");
const rateDiv = document.getElementById("rate");
const updatedDiv = document.getElementById("updated");

async function convertCurrency() {
    const amount = amountInput.value;
    const from = fromCurrency.value;
    const to = toCurrency.value;

    if (!amount || amount <= 0) {
        resultDiv.innerHTML = "Enter valid amount";
        return;
    }

    try {
        const response = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
        const data = await response.json();

        const rate = data.rates[to];
        const converted = (amount * rate).toFixed(2);

        resultDiv.innerHTML = `${amount} ${from} = ₹ ${converted} ${to}`;
        rateDiv.innerHTML = `1 ${from} = ₹ ${rate} ${to}`;
        updatedDiv.innerHTML = `Last updated: ${data.date}`;

    } catch (error) {
        resultDiv.innerHTML = "Error fetching exchange rate";
    }
}

function swapCurrency() {
    let temp = fromCurrency.value;
    fromCurrency.value = toCurrency.value;
    toCurrency.value = temp;
    convertCurrency();
}

amountInput.addEventListener("input", convertCurrency);
fromCurrency.addEventListener("change", convertCurrency);
toCurrency.addEventListener("change", convertCurrency);
</script>

</body>
</html>
